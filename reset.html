<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Racescope – Passwort zurücksetzen</title>
<style>
  :root { --bg:#0A0A0A; --fg:#EDEDED; --muted:#9aa0a6; --yellow:#F2E500; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.6; padding:0 20px; }
  .wrap { max-width:420px; margin:0 auto; padding:56px 0; text-align:center; }
  .brand { font-weight:900; font-size:30px; letter-spacing:1px; margin-bottom:24px; }
  .brand .y { color:var(--yellow); }
  h1 { font-size:22px; margin:0 0 16px; }
  input { width:100%; padding:13px 14px; margin:8px 0; border-radius:10px;
    border:1px solid #333; background:#161616; color:var(--fg); font-size:16px; }
  button { width:100%; padding:14px; margin-top:12px; border:none; border-radius:10px;
    background:var(--yellow); color:#0A0A0A; font-weight:800; font-size:16px; cursor:pointer; }
  button:disabled { opacity:.5; cursor:default; }
  .msg { margin-top:16px; font-size:14px; }
  .ok { color:#69db7c; } .err { color:#ff6b6b; } .muted { color:var(--muted); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand">RACE<span class="y">SCOPE</span></div>
    <h1>Neues Passwort setzen</h1>
    <div id="form" style="display:none">
      <input id="pw1" type="password" placeholder="Neues Passwort (min. 6 Zeichen)" autocomplete="new-password" />
      <input id="pw2" type="password" placeholder="Passwort wiederholen" autocomplete="new-password" />
      <button id="save">Passwort speichern</button>
    </div>
    <p id="msg" class="msg muted">Einen Moment…</p>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    const SUPABASE_URL = 'https://qutoisvlcqixayaliubk.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1dG9pc3ZsY3FpeGF5YWxpdWJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1OTIxNTcsImV4cCI6MjA5NjE2ODE1N30.rlWlx3g0-TYYX_9iVJ7md6NSeF0a8Wy8O9KMyqDGRJY';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON, {
      auth: { detectSessionInUrl: true, flowType: 'implicit' }
    });

    const msg = document.getElementById('msg');
    const form = document.getElementById('form');

    function show(t, cls) { msg.textContent = t; msg.className = 'msg ' + (cls || 'muted'); }

    // Recovery-Session aus dem Link prüfen
    const { data } = await supabase.auth.getSession();
    let ready = !!data.session;
    supabase.auth.onAuthStateChange((event, session) => {
      if (session) { ready = true; form.style.display = 'block'; show('Gib dein neues Passwort ein.'); }
    });
    if (ready) { form.style.display = 'block'; show('Gib dein neues Passwort ein.'); }
    else { show('Öffne diese Seite über den Link aus deiner „Passwort zurücksetzen"-E-Mail.', 'muted'); }

    document.getElementById('save').addEventListener('click', async () => {
      const p1 = document.getElementById('pw1').value;
      const p2 = document.getElementById('pw2').value;
      if (p1.length < 6) return show('Passwort zu kurz (min. 6 Zeichen).', 'err');
      if (p1 !== p2) return show('Die Passwörter stimmen nicht überein.', 'err');
      show('Speichere…');
      const { error } = await supabase.auth.updateUser({ password: p1 });
      if (error) show('Fehler: ' + error.message, 'err');
      else { form.style.display = 'none'; show('✓ Passwort geändert! Du kannst dich jetzt in der App anmelden.', 'ok'); }
    });
  </script>
</body>
</html>
